<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StyleClone · 设计系统</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#EEF2FF"/>
    <rect x="30" y="30" width="40" height="40" rx="10" fill="#4F46E5"/>
    <text x="50" y="58" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" font-family="sans-serif">S</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="sec-styleguide.jsx"></script>
<script type="text/babel" src="sec-components.jsx"></script>
<script type="text/babel" src="sec-screens.jsx"></script>
<script type="text/babel" src="sec-modals.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <DesignCanvas>
        <DCSection id="styleguide" title="样式规范" subtitle="主播分身 · clean modern · tool-like · 浅色主题">
          <DCArtboard id="tokens" label="Design Tokens" width={1120} height={1304}>
            <StyleGuide />
          </DCArtboard>
        </DCSection>
        <DCSection id="components" title="组件库" subtitle="每个组件 × 全部状态 · 静态枚举">
          <DCArtboard id="all" label="Components × States" width={1320} height={2900}>
            <ComponentLib />
          </DCArtboard>
        </DCSection>
        <DCSection id="screens" title="主工作台 · 6 状态" subtitle="桌面应用 · 240 左栏 + 主列（信息条 / 消息流 / 输入栏）">
          <DCArtboard id="s1" label="① 空状态·无角色" width={1180} height={800}><Screen1 /></DCArtboard>
          <DCArtboard id="s2" label="② 训练中·解析分阶段" width={1180} height={800}><Screen2 /></DCArtboard>
          <DCArtboard id="s3" label="③ 就绪·对话空" width={1180} height={800}><Screen3 /></DCArtboard>
          <DCArtboard id="s4" label="④ 对话流式生成" width={1180} height={800}><Screen4 /></DCArtboard>
          <DCArtboard id="s5" label="⑤ 自动化运行中" width={1180} height={800}><Screen5 /></DCArtboard>
          <DCArtboard id="s6" label="⑥ 训练失败" width={1180} height={800}><Screen6 /></DCArtboard>
        </DCSection>
        <DCSection id="modals" title="弹窗 / 抽屉 · 4 个" subtitle="叠在变暗的就绪态外壳上">
          <DCArtboard id="m1" label="① 新建角色" width={1180} height={800}><Modal1 /></DCArtboard>
          <DCArtboard id="m2" label="② 风格设置（抽屉）" width={1180} height={800}><Modal2 /></DCArtboard>
          <DCArtboard id="m3" label="③ 上传素材" width={1180} height={800}><Modal3 /></DCArtboard>
          <DCArtboard id="m4" label="④ 删除角色确认" width={1180} height={800}><Modal4 /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
